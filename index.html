<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Quick links to Instagram videos">
    <title>Instagram Videos</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ef;
        --ink: #181614;
        --muted: #6f665d;
        --card: #ffffff;
        --accent: #c13584;
        --accent-dark: #833ab4;
        --border: rgba(24, 22, 20, 0.12);
        --shadow: 0 18px 50px rgba(24, 22, 20, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(193, 53, 132, 0.14), transparent 30rem),
          linear-gradient(135deg, #f7f4ef 0%, #f0f4f8 100%);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 460px);
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: clamp(24px, 6vw, 40px);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 10vw, 3.25rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        margin: 16px 0 28px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      nav {
        display: grid;
        gap: 12px;
      }

      a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 60px;
        padding: 0 18px;
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--ink);
        font-size: 1.05rem;
        font-weight: 700;
        text-decoration: none;
        transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      }

      a:hover,
      a:focus-visible {
        border-color: rgba(193, 53, 132, 0.42);
        box-shadow: 0 10px 24px rgba(193, 53, 132, 0.16);
        outline: none;
        transform: translateY(-1px);
      }

      .number {
        display: inline-grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: #fff;
        font-size: 0.95rem;
        flex: 0 0 auto;
      }

      .arrow {
        color: var(--accent);
        font-size: 1.35rem;
        line-height: 1;
        padding-left: 16px;
      }

      .label {
        margin-right: auto;
        padding-left: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Instagram Videos</h1>
      <p>Choose one of the videos below.</p>
      <nav aria-label="Instagram video links">
        <a href="https://www.instagram.com/reel/DExfZCbuvK9/?igsh=MW1tc2Zxb3ZkM2Ezdg==" target="_blank" rel="noopener noreferrer">
          <span class="number">1</span>
          <span class="label">Video 1</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>
        <a href="https://www.instagram.com/reel/DIwLC1zqPun/?igsh=ajRxZjRpaDV0O" target="_blank" rel="noopener noreferrer">
          <span class="number">2</span>
          <span class="label">Video 2</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>
        <a href="https://www.instagram.com/reel/C-h0DnzoRnC/?igsh=MWIwMHFyYXNkNnllNQ==" target="_blank" rel="noopener noreferrer">
          <span class="number">3</span>
          <span class="label">Video 3</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>
        <a href="https://www.instagram.com/reel/CbmfhAmgRNk/?igsh=MXYxdHF0MDdleW15aA==" target="_blank" rel="noopener noreferrer">
          <span class="number">4</span>
          <span class="label">Video 4</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>
      </nav>
    </main>
  </body>
</html>
